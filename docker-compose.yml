services:
  postgres:
    image: postgres:16-alpine
    container_name: system_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: erp_v1
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: system_cache
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: system_mq
    restart: always
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    volumes:
      - mqdata:/var/lib/rabbitmq

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: system_api
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs  # Maps the host's log folder to the container
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - rabbitmq

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: system_worker
    restart: always
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - rabbitmq

volumes:
  pgdata:
  redisdata:
  mqdata:
