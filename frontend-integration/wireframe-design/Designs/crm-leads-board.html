<body class="bg-background antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Ambient Background -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-30" data-alt="A stunning, highly professional corporate background suitable for an enterprise login screen. The scene features abstract, flowing architectural glass panels capturing soft, natural morning light. The color palette revolves around crisp whites, subtle slate grays, and very soft, diffused hints of deep emerald green to match the brand identity. The overall mood is incredibly clean, modern, secure, and minimal, conveying institutional trust and high-end technological capability without distracting from the central UI elements." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDbo2gssLALEDw2V1qjFgFd3iN2_9L4ncZdV2jbsBabP6lRcjQ7O2_8SvlElVhLPe-LgYu9CA1_tANR0CuMglV6ulOtCBVTF7LyXyp-8nrbm1lvE4Tp4ChGbhpSw0bcdB7E70o2qgTzGtb_oP7LJHmJlPNV4-CI4Q_x5T93ssuccgLtmEunqhw53-uEbGmbzShWNtuYOPTb-mcXE-OBF2tghJjE8A1vUdW1QgLW2AaqUippZ6HaE96KWDgloY-Oe6WPKfRURK9ajw');">
</div>
<!-- Main Container Card -->
<main class="relative z-10 w-full max-w-[420px] bg-surface-container-lowest rounded-xl shadow-[0px_12px_24px_rgba(26,43,60,0.15)] p-container-padding-mobile md:p-container-padding-desktop mx-container-padding-mobile flex flex-col gap-stack-lg border border-outline-variant">
<!-- Logo & Header -->
<header class="flex flex-col items-center text-center gap-stack-sm pt-stack-sm">
<div class="w-16 h-16 rounded-xl bg-surface-container flex items-center justify-center mb-unit">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">assured_workload</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">Enterprise Suite</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Secure access to your workspace.</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md w-full">
<!-- Email Input Group -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface" for="email">Email Address</label>
<div class="relative w-full">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<input class="w-full bg-surface border border-outline rounded-lg pl-11 pr-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface" for="password">Password</label>
<div class="relative w-full">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input class="w-full bg-surface border border-outline rounded-lg pl-11 pr-12 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 px-4 flex items-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Meta Actions -->
<div class="flex justify-end items-center w-full mt-[-8px]">
<a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Submit Action -->
<button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-label-lg text-label-lg rounded-lg py-3 mt-stack-sm transition-colors duration-200 flex items-center justify-center gap-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
</main>
</body></html>
