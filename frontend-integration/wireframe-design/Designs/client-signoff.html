<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Execution Client Signoff Canvas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=IBM+Plex+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "surface-tint": "#2c694e",
                        "tertiary": "#5e4300",
                        "primary-fixed": "#b1f0ce",
                        "on-tertiary-fixed": "#271900",
                        "error-container": "#ffdad6",
                        "on-surface": "#111c2c",
                        "inverse-primary": "#95d4b3",
                        "inverse-on-surface": "#ebf1ff",
                        "on-error": "#ffffff",
                        "outline-variant": "#bfc9c1",
                        "surface-container-low": "#f0f3ff",
                        "on-tertiary-fixed-variant": "#5d4200",
                        "tertiary-fixed-dim": "#f7bd48",
                        "tertiary-fixed": "#ffdea6",
                        "on-secondary-fixed": "#0b1d2d",
                        "on-secondary-container": "#556679",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#b7c8de",
                        "on-background": "#111c2c",
                        "primary": "#0f5238",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#d8e3fa",
                        "surface-dim": "#cfdaf1",
                        "on-primary-fixed-variant": "#0e5138",
                        "on-secondary": "#ffffff",
                        "primary-container": "#2d6a4f",
                        "outline": "#707973",
                        "inverse-surface": "#263142",
                        "secondary-fixed": "#d2e4fb",
                        "surface": "#f9f9ff",
                        "secondary-container": "#d2e4fb",
                        "surface-variant": "#d8e3fa",
                        "on-surface-variant": "#404943",
                        "primary-fixed-dim": "#95d4b3",
                        "on-primary-fixed": "#002114",
                        "surface-container": "#e7eeff",
                        "surface-bright": "#f9f9ff",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#ffd384",
                        "on-primary-container": "#a8e7c5",
                        "surface-container-high": "#dee8ff",
                        "tertiary-container": "#7c5900",
                        "secondary": "#4f6073",
                        "on-secondary-fixed-variant": "#38485a",
                        "background": "#f9f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "24px",
                        "unit": "8px",
                        "container-padding-desktop": "32px",
                        "gutter": "24px",
                        "container-padding-mobile": "16px",
                        "stack-sm": "8px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-md": ["IBM Plex Sans"],
                        "display-lg": ["IBM Plex Sans"],
                        "headline-lg-mobile": ["IBM Plex Sans"],
                        "body-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-lg": ["IBM Plex Sans"],
                        "label-md": ["Inter"],
                        "headline-sm": ["IBM Plex Sans"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "500" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Force landscape visually if device is portrait, though normally handled by OS/app */
        @media screen and (orientation: portrait) {
            body {
                transform: rotate(-90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                overflow-x: hidden;
                position: absolute;
                top: 100%;
                left: 0;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden flex flex-col">
<!-- Top App Bar -->
<header class="bg-surface border-b border-outline-variant flex justify-between items-center w-full px-container-padding-mobile md:px-container-padding-desktop h-16 shrink-0 z-10">
<div class="flex items-center gap-stack-md">
<span aria-hidden="true" class="material-symbols-outlined text-primary text-2xl">check_circle</span>
<h1 class="font-headline-md text-headline-md font-semibold text-primary">Enterprise Suite</h1>
</div>
<div class="flex items-center gap-stack-sm">
<span aria-hidden="true" class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-low transition-colors p-2 rounded-full cursor-pointer">notifications</span>
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-label-lg text-label-lg">
                U
            </div>
</div>
</header>
<!-- Main Canvas Area -->
<main class="flex-1 flex flex-col p-container-padding-mobile md:p-container-padding-desktop gap-stack-lg overflow-hidden bg-surface-container-lowest">
<!-- Header Text -->
<div class="text-center shrink-0">
<h2 class="font-headline-sm text-headline-sm text-on-surface">I hereby approve the installation works completed at this site.</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-unit">Please provide your signature below to confirm.</p>
</div>
<!-- Signature Pad Area -->
<div class="flex-1 relative border border-outline-variant rounded-lg bg-surface flex flex-col overflow-hidden shadow-sm">
<!-- Simulated touch area -->
<div class="flex-1 w-full h-full relative cursor-crosshair touch-none">
<!-- Watermark / Placeholder -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
<span class="material-symbols-outlined text-6xl text-outline">draw</span>
</div>
<!-- Simulated signature line -->
<div class="absolute bottom-1/4 left-10 right-10 border-b-2 border-outline-variant/50 pointer-events-none"></div>
<div class="absolute bottom-[calc(25%-20px)] left-10 pointer-events-none font-label-md text-label-md text-outline-variant uppercase">Sign Here</div>
</div>
<!-- Controls Overlay within Pad -->
<div class="absolute top-4 right-4">
<button class="flex items-center gap-unit px-3 py-2 rounded-DEFAULT bg-surface border border-outline text-secondary font-label-lg text-label-lg hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[18px]">ink_eraser</span>
                    Erase Signature
                </button>
</div>
</div>
<!-- Actions -->
<div class="flex justify-end gap-stack-md shrink-0 py-2">
<button class="px-6 py-3 rounded-lg border border-primary text-primary font-label-lg text-label-lg hover:bg-surface-container-low transition-colors">
                Cancel
            </button>
<button class="px-6 py-3 rounded-lg bg-primary text-on-primary font-label-lg text-label-lg hover:opacity-90 transition-opacity flex items-center gap-unit shadow-sm">
<span class="material-symbols-outlined text-[20px]">check</span>
                Accept &amp; Approve
            </button>
</div>
</main>
</body></html>
